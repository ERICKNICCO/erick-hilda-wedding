<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #EBF3FB;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Lato', sans-serif;
  margin: 0; width: 100%;
}
.card-image-wrap { width: 100%; max-width: 520px; display: block; line-height: 0; margin: 0 auto; }
.card-image-wrap img { width: 100%; height: auto; display: block; }
.pledge-wrap { width: 100%; max-width: 520px; background: #fff; border-top: 3px solid #1A4A8A; box-shadow: 0 8px 40px rgba(0,0,0,0.13); overflow: hidden; margin: 0 auto; box-sizing: border-box; }
.pledge-header { background: linear-gradient(135deg, #EBF3FB 0%, #fff 100%); padding: 28px 40px 18px 40px; text-align: center; border-bottom: 1px solid #BBDEFB; box-sizing: border-box; }
.side-pill { display: inline-block; background: #1A4A8A; color: #fff; font-family: 'Cinzel', serif; font-size: 8.5px; letter-spacing: 3px; padding: 4px 16px; border-radius: 20px; text-transform: uppercase; margin-bottom: 14px; }
.pledge-title { font-family: 'Great Vibes', cursive; font-size: 38px; color: #1A4A8A; line-height: 1.1; margin-bottom: 4px; }
.pledge-subtitle { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; color: #1a1a1a; text-transform: uppercase; font-weight: 700; }
.event-info { text-align: center; padding: 14px 20px 0; font-family: 'Cormorant Garamond', serif; font-size: 15px; color: #555; }
.event-info strong { color: #1A4A8A; }
.form-wrap { padding: 28px 40px 32px 40px; background: #fff; box-sizing: border-box; }
.form-group { margin-bottom: 22px; }
label { display: block; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px; color: #1a1a1a; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
input { width: 100%; padding: 10px 0 8px; border: none; border-bottom: 1.5px solid #BBDEFB; background: transparent; font-size: 15px; font-family: 'Cormorant Garamond', serif; color: #1a1a1a; outline: none; transition: border-color 0.25s; box-sizing: border-box; }
input:focus { border-bottom-color: #1A4A8A; }
input::placeholder { color: #999; font-size: 13px; font-family: 'Lato', sans-serif; }
.btn { width: 100%; margin-top: 8px; padding: 15px; background: linear-gradient(135deg, #0D2B5E 0%, #1A4A8A 100%); color: #fff; border: none; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; position: relative; box-sizing: border-box; }
.btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #90CAF9; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { margin-top: 14px; padding: 12px 16px; font-size: 13px; text-align: center; display: none; font-family: 'Lato', sans-serif; line-height: 1.5; }
.msg.success { background: #EBF3FB; color: #0D2B5E; display: block; border-left: 3px solid #1A4A8A; }
.msg.error { background: #fff5f5; color: #c62828; display: block; border-left: 3px solid #ef5350; }
.card-footer { background: linear-gradient(135deg, #EBF3FB, #fff); padding: 16px 40px 20px 40px; text-align: center; border-top: 1px solid #BBDEFB; box-sizing: border-box; }
.inv-number { font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 2px; color: #1a1a1a; font-weight: 700; margin-bottom: 4px; min-height: 20px; }
.footer-names { font-family: 'Great Vibes', cursive; font-size: 22px; color: #1A4A8A; margin-top: 4px; }
@media (max-width: 600px) {
  .card-image-wrap, .pledge-wrap { max-width: 100%; }
  .pledge-header { padding: 24px 20px 16px 20px; }
  .form-wrap { padding: 24px 20px 28px 20px; }
  .card-footer { padding: 12px 20px 18px 20px; }
  input { font-size: 16px; }
  .pledge-title { font-size: clamp(30px, 9vw, 38px); }
  .btn { font-size: 11px; letter-spacing: 2px; padding: 16px; }
}
</style>

    <div class="msg" id="msg"></div>
  </div>

  <div class="card-footer">
    <div class="inv-number" id="invNum"></div>
    <div class="footer-names">Grace F. Kijo</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'YOUR_GRACE_APPS_SCRIPT_URL_HERE';
const PREFIX = 'GK';

const storageKey = 'inv_grace_sendoff';
let invNumber = localStorage.getItem(storageKey);
if (!invNumber) {
  const num = Math.floor(Math.random() * 899) + 100;
  invNumber = PREFIX + '-' + String(num).padStart(3, '0');
  localStorage.setItem(storageKey, invNumber);
}
document.getElementById('invNum').textContent = 'Invitation No: ' + invNumber;

function formatAmount(input) {
  let raw = input.value.replace(/[^0-9]/g, '');
  if (raw === '') { input.value = ''; return; }
  input.value = parseInt(raw).toLocaleString('en-US');
}

function showMsg(t, type) {
  const el = document.getElementById('msg');
  el.textContent = t;
  el.className = 'msg ' + type;
}

async function submitPledge() {
  const name   = document.getElementById('name').value.trim();
  const phone  = document.getElementById('phone').value.trim();
  const amount = document.getElementById('amount').value.trim();

  if (!name || !phone || !amount) {
    showMsg('Please fill in all fields.', 'error');
    return;
  }
  if (Number(amount.replace(/,/g, '')) <= 0) {
    showMsg('Please enter a valid amount.', 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        invNumber: invNumber,
        name, phone,
        amount: Number(amount.replace(/,/g, '')),
        date: new Date().toLocaleDateString('en-GB')
      })
    });

    showMsg('✓ Your pledge has been sent! Thank you so much for your love. ❤', 'success');
    btn.textContent = 'Sent ✓';

  } catch(e) {
    showMsg('An error occurred — please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Send My Pledge';
  }
}
</script>
</body>
</html>

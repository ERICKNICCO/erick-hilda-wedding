<head>
<meta charset="UTF-8">

<title>Erick & Hilda — Mwaliko wa Harusi</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: #f0eaf5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
  font-family: 'Lato', sans-serif;
  margin: 0;
}

/* ── INVITATION CARD IMAGE ── */
.card-image-wrap {
  width: 100%;
  max-width: 480px;
  display: block;
  line-height: 0;
  align-self: center;
}
.card-image-wrap img {
  width: 100%;
  height: auto;
  display: block;
}

/* ── PLEDGE SECTION ── */
.pledge-wrap {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-top: 3px solid #B8912A;
  box-shadow: 0 8px 40px rgba(0,0,0,0.13);
  overflow: hidden;
}

.pledge-header {
  background: linear-gradient(135deg, #f9f5ff 0%, #fff 100%);
  padding: 28px 40px 18px 40px;
  text-align: center;
  border-bottom: 1px solid #ede8f5;
  width: 100%;
}

.side-pill {
  display: inline-block;
  background: #7B3F8C;
  color: #fff;
  font-family: 'Cinzel', serif;
  font-size: 8.5px;
  letter-spacing: 3px;
  padding: 4px 16px;
  border-radius: 20px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.pledge-title {
  font-family: 'Great Vibes', cursive;
  font-size: 38px;
  color: #B8912A;
  line-height: 1.1;
  margin-bottom: 4px;
}

.pledge-subtitle {
  font-family: 'Cinzel', serif;
  font-size: 8.5px;
  letter-spacing: 3px;
  color: #aaa;
  text-transform: uppercase;
}





.detail-item + 



/* Form */
.form-wrap {
  padding: 20px 40px 32px 40px;
  background: #fff;
  width: 100%;
}

.form-group {
  margin-bottom: 18px;
  position: relative;
}
label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 7.5px;
  letter-spacing: 2.5px;
  color: #B8912A;
  text-transform: uppercase;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 0 8px;
  border: none;
  border-bottom: 1.5px solid #e0d8ec;
  background: transparent;
  font-size: 15px;
  font-family: 'Cormorant Garamond', serif;
  color: #2a2a2a;
  outline: none;
  transition: border-color 0.25s;
}
input:focus {
  border-bottom-color: #B8912A;
}
input::placeholder {
  color: #ccc;
  font-size: 13px;
  font-family: 'Lato', sans-serif;
}

/* Submit button */
.btn-wrap {
  margin-top: 6px;
}
.btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #2a1a3a 0%, #3d2255 100%);
  color: #fff;
  border: none;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.2s;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: #B8912A;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.msg {
  margin-top: 14px;
  padding: 12px 16px;
  font-size: 13px;
  text-align: center;
  display: none;
  font-family: 'Lato', sans-serif;
  line-height: 1.5;
}
.msg.success {
  background: linear-gradient(135deg, #f5fff5, #eafaea);
  color: #2e7d32;
  display: block;
  border-left: 3px solid #B8912A;
}
.msg.error {
  background: #fff5f5;
  color: #c62828;
  display: block;
  border-left: 3px solid #ef5350;
}

/* Footer */
.card-footer {
  background: linear-gradient(135deg, #f9f5ff, #fff);
  padding: 12px 28px 18px;
  text-align: center;
  border-top: 1px solid #ede8f5;
}
.inv-number {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  color: #ccc;
}
.footer-names {
  font-family: 'Great Vibes', cursive;
  font-size: 22px;
  color: #B8912A;
  margin-top: 4px;
}
</style>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzclLqI_npA9nI7m49qqgBKacKYayPBEmwdT1Qu3dy135Y-klwdbS3rrYesZ4ZS8H6ugQ/exec';
const SHEET_NAME = 'Erick's Family & Friends';
const INV_PREFIX = 'E';

function getInvNumber() {
  const key = 'invNum_Erick';
  let n = sessionStorage.getItem(key);
  if (!n) {
    n = INV_PREFIX + '-' + (Math.floor(Math.random() * 900) + 100);
    sessionStorage.setItem(key, n);
  }
  return n;
}

const invNum = getInvNumber();
document.getElementById('invNum').textContent = 'Invitation No: ' + invNum;

function showMsg(t, type) {
  const el = document.getElementById('msg');
  el.textContent = t;
  el.className = 'msg ' + type;
}

async function submitPledge() {
  const name   = document.getElementById('name').value.trim();
  const phone  = document.getElementById('phone').value.trim();
  const amount = document.getElementById('amount').value.trim();

  if (!name || !phone || !amount) {
    showMsg('Tafadhali jaza sehemu zote — Please fill all fields.', 'error');
    return;
  }
  if (Number(amount) <= 0) {
    showMsg('Tafadhali ingiza kiasi sahihi — Enter a valid amount.', 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Inatuma...';
  document.getElementById('msg').className = 'msg';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sheet: SHEET_NAME,
        invNumber: invNum,
        name, phone,
        amount: Number(amount),
        date: new Date().toLocaleDateString('sw-TZ'),
        side: 'Erick'
      })
    });
    showMsg('✓ Ahadi yako imetumwa! Asante sana kwa upendo wako. ❤', 'success');
    btn.textContent = 'Imetumwa ✓';
  } catch(e) {
    showMsg('Hitilafu imetokea — please try again.', 'error');
    btn.disabled = false;
    btn.textContent = 'Tuma Ahadi · Send My Pledge';
  }
}
</script>
</body>
</html>
